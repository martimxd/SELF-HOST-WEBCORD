services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webcord}
      POSTGRES_USER: ${POSTGRES_USER:-webcord}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webcord} -d ${POSTGRES_DB:-webcord}"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY in .env}: ${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET in .env}"
    volumes: [./infra/docker/livekit.yaml:/etc/livekit.yaml:ro]
    ports: ["7880:7880", "7881:7881", "50000-50100:50000-50100/udp"]
    depends_on:
      redis: { condition: service_healthy }
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-webcord}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-webcord}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      API_PORT: 4000
      UPLOAD_DIR: /data/uploads
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY in .env}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET in .env}
    volumes: [uploads_data:/data/uploads]
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      livekit: { condition: service_started }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL:-}
    restart: unless-stopped
    ports: ["${WEB_PORT:-3000}:80"]
    depends_on:
      api: { condition: service_healthy }
volumes:
  postgres_data:
  redis_data:
  uploads_data:
